# Rendered by nginx's envsubst at container start (see Dockerfile: copied to
# /etc/nginx/templates/default.conf.template). ${PORT}, ${BACKEND_URL} and
# ${RESOLVER} are substituted from the environment (RESOLVER is exported by the
# executable 15-resolver.envsh, parsed from /etc/resolv.conf with a fallback).
# nginx runtime variables ($uri, $host, ...) are left untouched.
#
# Local docker compose: Dockerfile ENV defaults make this behave as before
# (listen 80, proxy to http://backend:8080). Railway overrides via service vars.
server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # This app is a Module Federation remote: the shell (different origin) fetches
    # remoteEntry.js and lazy chunks cross-origin, so CORS must be open.
    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the BLL so the browser calls same-origin /api (no CORS).
    # Resolve the backend host at request time so nginx boots even if the
    # backend is not up yet and re-resolves its address after a redeploy.
    location /api/ {
        resolver ${RESOLVER} valid=10s;
        set $bll_upstream ${BACKEND_URL};
        proxy_pass $bll_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
