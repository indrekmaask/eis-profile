server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # This app is a Module Federation remote: the shell (different origin) fetches
    # remoteEntry.js and lazy chunks cross-origin, so CORS must be open.
    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files $uri $uri/ /index.html;
    }
}
