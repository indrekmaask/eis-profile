server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: profile-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:eis_profile}
    username: ${POSTGRES_USER:eis}
    password: ${POSTGRES_PASSWORD:eis}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.default_schema: profile
  flyway:
    enabled: true
    default-schema: profile
    schemas: profile
    create-schemas: true
    clean-disabled: false
    # Seeds live in the V900+ range and are applied first on fresh DBs, so later
    # schema migrations (V12+) are out-of-order by design.
    out-of-order: true
    locations: classpath:db/migration,classpath:db/seed

# Integration + feature flags (used from Phase 2 onward; declared here so config is visible early)
eis:
  registry:
    base-url: ${REGISTRY_API_BASE_URL:http://localhost:3000}
  crm:
    enabled: ${CRM_ENABLED:false}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    doc-expansion: list

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
