server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # This app is a Module Federation remote: the shell (different origin) fetches
    # remoteEntry.js and lazy chunks cross-origin, so CORS must be open.
    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the BLL so the browser calls same-origin /api (no CORS).
    # Resolve the backend hostname at request time via Docker's embedded DNS
    # (127.0.0.11) so nginx boots even if this container starts before backend.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $bll_upstream backend;
        proxy_pass http://$bll_upstream:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
